esphome:
  name: polverine
  project:
    name: blackiot.polverine
    version: "0.2"

api:
  encryption:
    key: !secret api_key

wifi:
  use_address: 192.168.2.1
  id: wifi_component
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  password: !secret ota_password
  id: my_ota
  platform: esphome

web_server:
  port: 80

logger:
  level: DEBUG

i2c:
  sda: 14
  scl: 21
  scan: true
  id: bus_a

spi:
  clk_pin: 12
  mosi_pin: 11
  miso_pin: 13
  id: bus_b

external_components:
  # Unified I2C+SPI branch. Pull latest while we iterate; pin to @v0.2.0 once validated.
  - source: github://dadcoachengineer/esphome-bmv080-spi@feat/unify-i2c-spi
    components: [bmv080, bmv080_spi]
    refresh: 0s

# BMV080 PM sensor over SPI (renamed hub key: was `bmv080:` in v0.1.0).
bmv080_spi:
  id: bmv080_sensor
  spi_id: bus_b
  cs_pin: 10
  mode: continuous
  measurement_algorithm: high_precision
  update_interval: 5s

binary_sensor:
  - platform: bmv080
    bmv080_id: bmv080_sensor
    obstructed:   { name: "Polverine Sensor Obstructed" }
    out_of_range: { name: "Polverine Out of Range" }

sensor:
  - platform: bmv080
    bmv080_id: bmv080_sensor
    pm_2_5: { name: "Polverine PM 2.5" }
    pm_1_0: { name: "Polverine PM 1.0" }
    pm_10:  { name: "Polverine PM 10" }
    pm_2_5_count: { name: "Polverine PM 2.5 Count" }
    runtime: { name: "Polverine BMV080 Runtime" }

  # BME690 over I2C via the stock `bme680` component (raw register read +
  # in-firmware compensation). The BME690 shares the BME680/688 chip-id (0x61)
  # and calibration registers, so temperature / pressure / humidity read
  # ACCURATELY (this is what fixes the old `model: bme688` BSEC offset).
  #
  # GAS IS OMITTED ON PURPOSE. The BME690 is a "high-gas" variant: Bosch selects
  # the gas algorithm by the variant register (0xF0), and ESPHome's stock bme680
  # only implements the BME680 "low-gas" lookup-table path and never reads 0xF0 —
  # so on a BME690 it reads gas bytes from the wrong offsets with the wrong
  # formula and returns a MEANINGLESS resistance (ESPHome #11939, PR #4498).
  # Omitting `heater:` => set_heater(0,0) => plate off, so it also can't
  # self-heat the die and skew the temperature. BME690 gas/IAQ would need the
  # unmerged BSEC3 `bme690` component (esp-idf framework + a Bosch blob).
  - platform: bme680
    i2c_id: bus_a
    address: 0x76
    update_interval: 60s
    temperature:
      name: "BME690 Temperature"
      filters:
        - delta: 0.1
    pressure:
      name: "BME690 Pressure"
      filters:
        - delta: 0.5
    humidity:
      name: "BME690 Humidity"
      filters:
        - delta: 0.2

  - platform: internal_temperature
    name: "ESP32 Internal Temperature"
    update_interval: 60s
    filters:
      - delta: 0.2

  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s

text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true

output:
  - platform: ledc
    pin: 47
    id: led_r
    frequency: 1000 Hz
  - platform: ledc
    pin: 48
    id: led_g
    frequency: 1000 Hz
  - platform: ledc
    pin: 38
    id: led_b
    frequency: 1000 Hz

light:
  - platform: rgb
    name: "Status LED"
    id: status_led
    red: led_r
    green: led_g
    blue: led_b
    effects:
      - flicker:
      - random:
      - strobe:
          colors:
            - state: ON
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 0.5s
            - state: OFF
              duration: 0.5s

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
    version: recommended

interval:
  - interval: 2s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 100%
                blue: 0%
                brightness: 30%
          else:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 0%
                blue: 100%
                brightness: 30%
                effect: flicker
