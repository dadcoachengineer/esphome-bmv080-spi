esphome:
  name: polverine
  project:
    name: blackiot.polverine
    version: "0.2"

api:
  encryption:
    key: !secret api_key

wifi:
  use_address: 192.168.2.1
  id: wifi_component
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  password: !secret ota_password
  id: my_ota
  platform: esphome

web_server:
  port: 80

logger:
  level: DEBUG

i2c:
  sda: 14
  scl: 21
  scan: true
  id: bus_a

spi:
  clk_pin: 12
  mosi_pin: 11
  miso_pin: 13
  id: bus_b

external_components:
  # Unified I2C+SPI branch. Pull latest while we iterate; pin to @v0.2.0 once validated.
  - source: github://dadcoachengineer/esphome-bmv080-spi@feat/unify-i2c-spi
    components: [bmv080, bmv080_spi]
    refresh: 0s

# BMV080 PM sensor over SPI (renamed hub key: was `bmv080:` in v0.1.0).
bmv080_spi:
  id: bmv080_sensor
  spi_id: bus_b
  cs_pin: 10
  mode: continuous
  measurement_algorithm: high_precision
  update_interval: 5s

binary_sensor:
  - platform: bmv080
    bmv080_id: bmv080_sensor
    obstructed:   { name: "Polverine Sensor Obstructed" }
    out_of_range: { name: "Polverine Out of Range" }

sensor:
  - platform: bmv080
    bmv080_id: bmv080_sensor
    pm_2_5: { name: "Polverine PM 2.5" }
    pm_1_0: { name: "Polverine PM 1.0" }
    pm_10:  { name: "Polverine PM 10" }
    pm_2_5_count: { name: "Polverine PM 2.5 Count" }
    runtime: { name: "Polverine BMV080 Runtime" }

  # BME690 over I2C via the stock `bme680` component (raw read + in-firmware
  # compensation, no BSEC — avoids the old `model: bme688` BSEC offset). The
  # BME690 shares the BME680/688 chip-id (0x61) and calibration registers.
  #
  # GAS IS OMITTED + THE HEATER IS EXPLICITLY DISABLED. The BME690 is a "high-gas"
  # variant: Bosch selects the gas algorithm by the variant register (0xF0), and
  # stock bme680 implements only the BME680 "low-gas" path and never reads 0xF0 —
  # so gas_resistance is a frozen/meaningless value on a BME690 (ESPHome #11939,
  # PR #4498). NOTE: `heater:` must be set to NULL to disable it. OMITTING the key
  # does NOT disable it — bme680's to_code only calls set_heater() when the key is
  # present, so an omitted heater falls back to the C++ default (320°C/150ms, ON).
  # Only `heater:` with a null value hits `if not conf: set_heater(0,0)`. Disabling
  # the heater also stops it self-heating the die, which inflates temperature AND
  # (via t_fine) pressure.
  #
  # NOTE: T/P/H accuracy on the BME690 via stock bme680 is still being verified
  # on-device with the heater disabled. Full gas/IAQ would need the BSEC3 `bme690`
  # component (esp-idf framework + a Bosch blob), unmerged as of mid-2026.
  - platform: bme680
    i2c_id: bus_a
    address: 0x76
    update_interval: 60s
    temperature:
      name: "BME690 Temperature"
      filters:
        - delta: 0.1
    pressure:
      name: "BME690 Pressure"
      filters:
        - delta: 0.5
    humidity:
      name: "BME690 Humidity"
      filters:
        - delta: 0.2
    heater:   # null => set_heater(0,0) => heater OFF (omitting would default it ON)

  - platform: internal_temperature
    name: "ESP32 Internal Temperature"
    update_interval: 60s
    filters:
      - delta: 0.2

  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s

text_sensor:
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true

output:
  - platform: ledc
    pin: 47
    id: led_r
    frequency: 1000 Hz
  - platform: ledc
    pin: 48
    id: led_g
    frequency: 1000 Hz
  - platform: ledc
    pin: 38
    id: led_b
    frequency: 1000 Hz

light:
  - platform: rgb
    name: "Status LED"
    id: status_led
    red: led_r
    green: led_g
    blue: led_b
    effects:
      - flicker:
      - random:
      - strobe:
          colors:
            - state: ON
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 0.5s
            - state: OFF
              duration: 0.5s

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
    version: recommended

interval:
  - interval: 2s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 100%
                blue: 0%
                brightness: 30%
          else:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 0%
                blue: 100%
                brightness: 30%
                effect: flicker
